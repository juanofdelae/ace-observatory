name: Build and deploy to riacevents.org

# Triggers:
#   - push to main → auto-deploy
#   - manual run from the Actions tab → re-deploy on demand
on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time. Newer pushes cancel in-flight builds so
# we never have two SFTP uploads racing for /ACE/observatory/.
concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (locked)
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NODE_ENV: production

      # Sanity check: bail out if `out/` is missing or empty so we
      # never upload a partial build over a working production site.
      - name: Verify build output
        run: |
          test -d out || (echo "::error::out/ missing — build failed" && exit 1)
          test -f out/index.html || (echo "::error::out/index.html missing" && exit 1)
          test -f out/.htaccess || (echo "::error::out/.htaccess missing" && exit 1)
          echo "out/ size: $(du -sh out/ | cut -f1)"

      # Incremental FTPS upload — works with cPanel-style shared
      # hosting (port 21 + TLS). Only changed files are pushed on
      # subsequent runs, so deploys after the first 700 MB upload
      # take 1–2 minutes. The `exclude` block below preserves the
      # /documents folder (manually uploaded PDFs, ~500 MB) so the
      # sync never deletes or re-uploads them.
      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          server-dir: ${{ secrets.SFTP_REMOTE_PATH }}/
          local-dir: ./out/
          protocol: ftps
          port: 21
          # Belt-and-braces: never touch the manually-uploaded PDFs,
          # the .well-known SSL cert dir, or anything outside our
          # build output that the host might add.
          exclude: |
            **/documents/**
            documents/**
            **/.well-known/**
            .well-known/**
            **/.git/**
            **/node_modules/**
